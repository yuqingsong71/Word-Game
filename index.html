<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Spelling Game v2</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f9f9f9;
        }
        #timer {
            position: fixed;
            top: 10px;
            right: 10px;
            font-size: 1.2em;
        }
        .input-container {
            display: flex;
            align-items: center;
            margin: 10px 0;
        }
        input {
            font-size: 1.5em;
            padding: 10px;
            border: 2px solid #ccc;
            border-radius: 5px;
        }
        .next-button {
            font-size: 1.8em;
            cursor: pointer;
            margin-left: 10px;
            background: none;
            border: none;
        }
        .feedback {
            font-size: 1.2em;
            margin-top: 10px;
            min-height: 20px;
        }
        .speaker {
            font-size: 2em;
            cursor: pointer;
            margin: 20px;
            transition: transform 0.2s;
            user-select: none;
        }
        .speaker:hover {
            transform: scale(1.1);
        }
        .speaker:active {
            transform: scale(0.95);
        }
        .score {
            font-size: 1.5em;
            margin-top: 20px;
        }
        .current-word {
            font-size: 1.2em;
            color: #666;
            margin: 5px 0;
        }
        .voice-status {
            font-size: 0.85em;
            color: #666;
            margin-top: 15px;
            text-align: center;
            padding: 8px 15px;
            background-color: #e8e8e8;
            border-radius: 5px;
        }
        .refresh-voices {
            font-size: 0.8em;
            color: #007bff;
            cursor: pointer;
            text-decoration: underline;
            margin-top: 5px;
        }
        .refresh-voices:hover {
            color: #0056b3;
        }
    </style>
</head>
<body>
    <div id="timer">🕒 00:00:00</div>
    <div class="speaker" id="speakerBtn" title="Click to hear the word">🔊</div>
    <div class="current-word">Click the speaker to hear the word</div>
    <div class="input-container">
        <input type="text" id="wordInput" placeholder="Type the word here" autofocus>
        <button class="next-button" id="nextBtn" title="Submit and next word">➡️</button>
    </div>
    <div class="feedback" id="feedback"></div>
    <div class="score" id="scoreDisplay"></div>
    <div class="voice-status" id="voiceStatus">Initializing speech...</div>
    <div class="refresh-voices" id="refreshBtn" style="display: none;">Refresh voices</div>

    <script>
        // Word list
        const words = ['photo', 'vegetation', 'humid', 'shady', 'stress',
                      'canyon', 'temperature', 'mechanism', 'regular', 'filter'];

        // Game state
        let currentIndex = 0;
        let score = 0;
        let startTime = Date.now();
        let wordSpoken = false;
        let isSpeaking = false;
        let voicesLoaded = false;
        let voiceLoadAttempts = 0;
        let selectedVoice = null;

        const MAX_VOICE_LOAD_ATTEMPTS = 10;

        // DOM elements
        const synth = window.speechSynthesis;
        const inputField = document.getElementById('wordInput');
        const feedback = document.getElementById('feedback');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const timerDisplay = document.getElementById('timer');
        const currentWordDisplay = document.querySelector('.current-word');
        const voiceStatus = document.getElementById('voiceStatus');
        const speakerBtn = document.getElementById('speakerBtn');
        const nextBtn = document.getElementById('nextBtn');
        const refreshBtn = document.getElementById('refreshBtn');

        // Voice priorities
        const VOICE_PRIORITIES = {
            'Google UK English Male': 10,
            'Google UK English Female': 9,
            'Microsoft Hazel Desktop': 8,
            'Microsoft Susan Desktop': 7,
            'Microsoft George Desktop': 7,
            'Daniel': 6,
            'Moira': 5,
            'Google UK English': 4,
            'British': 3,
            'UK': 3,
            'England': 3,
            'en-GB': 2,
        };

        // Get best British voice
        function getBestBritishVoice(voices) {
            if (!voices || voices.length === 0) {
                return null;
            }

            console.log('Available voices:', voices.map(v => `${v.name} (${v.lang})`).join(', '));

            let bestVoice = null;
            let highestPriority = 0;

            for (let voice of voices) {
                const isBritish = voice.lang === 'en-GB' || voice.lang.startsWith('en-GB');

                if (!isBritish) {
                    continue;
                }

                for (let [voiceName, priority] of Object.entries(VOICE_PRIORITIES)) {
                    if (voice.name.includes(voiceName) && priority > highestPriority) {
                        bestVoice = voice;
                        highestPriority = priority;
                        console.log(`Found priority voice: ${voice.name} (priority: ${priority})`);
                        break;
                    }
                }
            }

            if (bestVoice) {
                return bestVoice;
            }

            const britishVoice = voices.find(voice =>
                voice.lang === 'en-GB' || voice.lang.startsWith('en-GB')
            );

            if (britishVoice) {
                console.log(`Found British voice: ${britishVoice.name}`);
                return britishVoice;
            }

            console.warn('No British English voice found, using fallback');
            return voices.find(voice => voice.lang.startsWith('en'));
        }

        // Initialize voices
        function initializeVoices() {
            const voices = synth.getVoices();
            console.log(`Voice load attempt ${voiceLoadAttempts + 1}: Found ${voices.length} voices`);

            if (voices.length > 0) {
                selectedVoice = getBestBritishVoice(voices);
                voicesLoaded = true;

                if (selectedVoice) {
                    voiceStatus.innerHTML = `🔊 Voice: <strong>${selectedVoice.name}</strong> (${selectedVoice.lang})`;
                    console.log('Selected voice:', selectedVoice.name, '-', selectedVoice.lang);
                } else {
                    voiceStatus.textContent = '⚠️ No English voice found';
                }

                refreshBtn.style.display = 'none';
            } else if (voiceLoadAttempts < MAX_VOICE_LOAD_ATTEMPTS) {
                voiceStatus.textContent = `Loading voices... (${voiceLoadAttempts + 1}/${MAX_VOICE_LOAD_ATTEMPTS})`;
                voiceLoadAttempts++;
                setTimeout(initializeVoices, 500);
            } else {
                voiceStatus.textContent = '⚠️ Speech synthesis not available';
                refreshBtn.style.display = 'block';
            }
        }

        // Refresh voices
        function refreshVoices() {
            voicesLoaded = false;
            voiceLoadAttempts = 0;
            refreshBtn.style.display = 'none';
            voiceStatus.textContent = 'Refreshing voices...';
            synth.cancel();

            setTimeout(() => {
                const voices = synth.getVoices();
                console.log('After refresh:', voices.length, 'voices');
                initializeVoices();
            }, 100);
        }

        // Speak word
        function speakWord() {
            console.log('speakWord called');

            if (!voicesLoaded) {
                initializeVoices();
                setTimeout(() => actuallySpeak(), 100);
            } else {
                actuallySpeak();
            }
        }

        function actuallySpeak() {
            if (isSpeaking) {
                synth.cancel();
                isSpeaking = false;
            }

            const utterance = new SpeechSynthesisUtterance(words[currentIndex]);

            if (selectedVoice) {
                utterance.voice = selectedVoice;
                console.log('Using voice:', selectedVoice.name);
            } else {
                utterance.lang = 'en-GB';
                console.log('No voice selected, using system default');
            }

            utterance.lang = 'en-GB';
            utterance.rate = 0.95;
            utterance.pitch = 1.0;
            utterance.volume = 1.0;

            utterance.onstart = () => {
                isSpeaking = true;
                wordSpoken = true;
                console.log('Speech started for:', words[currentIndex]);
            };

            utterance.onend = () => {
                isSpeaking = false;
                console.log('Speech ended');
            };

            utterance.onerror = (err) => {
                console.error('Speech error:', err);
                isSpeaking = false;

                if (err.error === 'not-allowed') {
                    voiceStatus.textContent = '❌ Speech access denied';
                } else if (err.error !== 'canceled') {
                    voiceStatus.textContent = `⚠️ Error: ${err.error}. Click Refresh voices.`;
                    refreshBtn.style.display = 'block';
                }
            };

            try {
                synth.speak(utterance);
            } catch (e) {
                console.error('Failed to speak:', e);
                voiceStatus.textContent = `❌ Error: ${e.message}`;
            }
        }

        // Next word
        function nextWord() {
            currentIndex++;
            wordSpoken = false;

            if (currentIndex < words.length) {
                inputField.value = '';
                feedback.textContent = '';
                currentWordDisplay.textContent = 'Click the speaker to hear the word';
            } else {
                endGame();
            }
        }

        // Check word
        function checkWord() {
            const userInput = inputField.value.trim().toLowerCase();
            if (userInput === words[currentIndex]) {
                feedback.textContent = '✅ Correct!';
                feedback.style.color = 'green';
                score += 10;
                scoreDisplay.textContent = `Score: ${score} / ${words.length * 10}`;
            } else {
                feedback.textContent = `❌ Incorrect! The correct word is "${words[currentIndex]}"`;
                feedback.style.color = 'red';
            }
        }

        // Check and next
        function checkAndNextWord() {
            checkWord();
            setTimeout(nextWord, 1500);
        }

        // End game
        function endGame() {
            inputField.disabled = true;
            feedback.textContent = 'Game Over!';
            feedback.style.color = 'blue';
            scoreDisplay.textContent = `Your final score is: ${score} / ${words.length * 10}`;
            nextBtn.disabled = true;
        }

        // Update timer
        function updateTimer() {
            const elapsed = Date.now() - startTime;
            const hours = Math.floor(elapsed / 3600000).toString().padStart(2, '0');
            const minutes = Math.floor((elapsed % 3600000) / 60000).toString().padStart(2, '0');
            const seconds = Math.floor((elapsed % 60000) / 1000).toString().padStart(2, '0');
            timerDisplay.textContent = `🕒 ${hours}:${minutes}:${seconds}`;
        }

        // Initialize voice system
        function initVoiceSystem() {
            initializeVoices();

            if (speechSynthesis.onvoiceschanged !== undefined) {
                speechSynthesis.onvoiceschanged = () => {
                    console.log('Voices changed event fired');
                    initializeVoices();
                };
            }

            let attempts = 0;
            const maxAttempts = 10;
            const checkInterval = setInterval(() => {
                attempts++;
                const voices = synth.getVoices();
                console.log(`Check ${attempts}: ${voices.length} voices available`);

                if (voices.length > 0 || attempts >= maxAttempts) {
                    clearInterval(checkInterval);
                    initializeVoices();
                }
            }, 500);
        }

        // Set up event listeners
        function setupEventListeners() {
            console.log('Setting up event listeners...');

            speakerBtn.addEventListener('click', speakWord);
            nextBtn.addEventListener('click', checkAndNextWord);
            refreshBtn.addEventListener('click', refreshVoices);

            inputField.addEventListener('keydown', (event) => {
                if (event.key === 'Enter') {
                    event.preventDefault();
                    checkAndNextWord();
                }
            });

            console.log('Event listeners set up successfully');
        }

        // Initialize everything
        function init() {
            console.log('Initializing game...');

            // Set up event listeners first
            setupEventListeners();

            // Initialize voice system
            initVoiceSystem();

            // Start timer
            setInterval(updateTimer, 1000);

            // Debug: show voices
            setTimeout(() => {
                const allVoices = synth.getVoices();
                console.log('=== All Available Voices ===');
                allVoices.forEach((v, i) => {
                    console.log(`${i + 1}. ${v.name} (${v.lang})${v.default ? ' [Default]' : ''}`);
                });
            }, 2000);

            console.log('Game initialized');
        }

        // Start when DOM is ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>
</html>
